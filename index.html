<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Minify / Beautify Tool</title>

<script src="https://cdn.jsdelivr.net/npm/js-beautify@1.15.4/js/lib/beautify.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-beautify@1.15.4/js/lib/beautify-css.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-beautify@1.15.4/js/lib/beautify-html.js"></script>

<style>
body{
    font-family:system-ui;
    background:#111;
    color:#eee;
    padding:20px;
}

textarea{
    width:100%;
    height:300px;
    background:#222;
    color:#fff;
    border:1px solid #555;
    padding:15px;
    font-family:monospace;
}

button{
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
}

select,input{
    padding:8px;
}
</style>
</head>

<body>

<h1>HTML / CSS / JS Minify & Beautify</h1>

<select id="type">
<option value="html">HTML</option>
<option value="css">CSS</option>
<option value="js">JavaScript</option>
</select>

<input type="file" id="file">

<br>

<textarea id="input" placeholder="コードを入力"></textarea>

<br>

<button onclick="minify()">Minify</button>
<button onclick="beautify()">Beautify</button>
<button onclick="copyText()">コピー</button>
<button onclick="download()">保存</button>

<textarea id="output" placeholder="結果"></textarea>


<script>

const input=document.querySelector("#input");
const output=document.querySelector("#output");
const type=document.querySelector("#type");


document.querySelector("#file")
.onchange=e=>{

const file=e.target.files[0];

if(!file)return;

let reader=new FileReader();

reader.onload=()=>{
input.value=reader.result;
};

reader.readAsText(file);

};



function minify(){

let code=input.value;

let t=type.value;


if(t==="html"){

code=code
.replace(/<!--[\s\S]*?-->/g,"")
.replace(/\s+/g," ")
.replace(/>\s+</g,"><")
.trim();

}


if(t==="css"){

code=code
.replace(/\/\*[\s\S]*?\*\//g,"")
.replace(/\s+/g," ")
.replace(/\s*([{}:;,])\s*/g,"$1")
.trim();

}


if(t==="js"){

code=code
.replace(/\/\/.*$/gm,"")
.replace(/\/\*[\s\S]*?\*\//g,"")
.replace(/\s+/g," ")
.trim();

}


output.value=code;

}



function beautify(){

let code=input.value;

let t=type.value;


if(t==="html"){

output.value=html_beautify(code,{
indent_size:2
});

}


if(t==="css"){

output.value=css_beautify(code,{
indent_size:2
});

}


if(t==="js"){

output.value=js_beautify(code,{
indent_size:2
});

}

}



function copyText(){

navigator.clipboard.writeText(output.value);

}



function download(){

let blob=new Blob(
[output.value],
{
type:"text/plain"
}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="output."+type.value;

a.click();

}

</script>

</body>
</html>
